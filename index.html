<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProStats Dashboard - 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e29;
    --border: rgba(255,255,255,0.07); --accent: #3b82f6;
    --text: #f1f5f9; --text2: #94a3b8; --text3: #475569;
    --green: #10b981; --red: #ef4444; --gold: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 0; }
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #3b82f6, #10b981); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; }
  main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
  .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--bg2); padding: 4px; border-radius: 10px; width: fit-content; border: 1px solid var(--border); }
  .tab { padding: 8px 20px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text2); border: none; background: transparent; transition: 0.2s; }
  .tab.active { background: var(--accent); color: white; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .metric .label { font-size: 11px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .metric .value { font-size: 26px; font-weight: 700; }
  .pronosticos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .prono-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; border-left: 4px solid var(--accent); }
  .prono-card .comp { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
  .prono-card .partido { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-right: 5px; }
  .badge-prono { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .badge-conf { background: rgba(16,185,129,0.15); color: var(--green); }
  .table-wrapper { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 12px 14px; color: var(--text3); text-align: left; text-transform: uppercase; font-size: 11px; background: var(--bg3); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text2); }
  .acierto-si { color: var(--green); font-weight: 700; }
  .acierto-no { color: var(--red); font-weight: 700; }
  #loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
  #error-msg { background: rgba(239,68,68,0.1); border: 1px solid var(--red); color: #fca5a5; padding: 16px; border-radius: 10px; margin-bottom: 20px; display: none; }
</style>
</head>
<body>

<div id="loading-overlay"><p>Cargando datos desde Google Sheets...</p></div>

<header>
  <div style="display:flex; align-items:center;">
    <div class="logo-icon">⚽</div>
    <div><h1>ProStats <span style="color:var(--accent)">Dashboard</span></h1></div>
  </div>
  <button id="update-btn" style="background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;" onclick="loadData()">Actualizar</button>
</header>

<main>
  <div id="error-msg"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('hoy')">📅 Pronósticos de hoy</button>
    <button class="tab" onclick="switchTab('historico')">📋 Historial</button>
    <button class="tab" onclick="switchTab('estadisticas')">📊 Estadísticas</button>
  </div>

  <div id="tab-hoy" class="tab-content active">
    <div class="metrics" id="metrics-hoy"></div>
    <div class="pronosticos-grid" id="pronosticos-hoy"></div>
  </div>

  <div id="tab-historico" class="tab-content">
    <div class="table-wrapper">
      <table>
        <thead><tr><th>Fecha</th><th>Liga</th><th>Partido</th><th>Pronóstico</th><th>%</th><th>Resultado</th><th>Acierto</th></tr></thead>
        <tbody id="tabla-historico"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-estadisticas" class="tab-content">
    <div class="metrics" id="metrics-stats"></div>
    <div style="height:300px; background:var(--bg2); padding:20px; border-radius:12px; border:1px solid var(--border);">
      <canvas id="chart-main"></canvas>
    </div>
  </div>
</main>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSlifIeovPtcFbFQfHA_tFamKQQGlsMtoj7mTD1wNs38UAqgLl24tJh9mI3K7Uop5XxqYP22OcvpZsX/pub?output=csv';

let allData = [];
let chartInstance = null;

async function loadData() {
  try {
    const resp = await fetch(CSV_URL + '&_t=' + Date.now());
    const text = await resp.text();
    const rows = parseCSV(text);
    const colMap = getColMap(rows[0]);

    allData = rows.map(r => {
      const resVal = r[colMap.resultado] || '';
      const aciertoRaw = (r[colMap.acierto] || '').toLowerCase();
      
      // LÓGICA CORREGIDA:
      let estado = 'pendiente';
      if (aciertoRaw === 'true' || aciertoRaw === 'si') {
        estado = 'si';
      } else if (resVal.trim() !== '' && resVal.trim() !== '—') {
        estado = 'no';
      }

      const local = r[colMap.local] || '';
      const visitante = r[colMap.visitante] || '';

      return {
        fecha: r[colMap.fecha],
        fechaObj: parseDate(r[colMap.fecha]),
        liga: r[colMap.comp] || 'Liga',
        partido: local && visitante ? `${local} vs ${visitante}` : (r[colMap.partido] || '—'),
        prono: r[colMap.prono] || '—',
        conf: r[colMap.conf] || '0%',
        resultado: resVal,
        acierto: estado
      };
    });

    document.getElementById('loading-overlay').style.display = 'none';
    renderHoy();
    renderHistorico();
    renderEstadisticas();
  } catch (e) {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Error al cargar: ' + e.message;
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
  return lines.slice(1).map(line => {
    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (values[i] || '').replace(/"/g,'').trim());
    return obj;
  });
}

function getColMap(sample) {
  return {
    fecha: 'fecha', local: 'local', visitante: 'visitante',
    comp: 'liga', prono: 'recomendacion', conf: '%',
    resultado: 'resultado', acierto: 'acierto', partido: 'partido'
  };
}

function parseDate(str) {
  if (!str) return null;
  const parts = str.split('/');
  return new Date(parts[2], parts[1]-1, parts[0]);
}

function isToday(date) {
  if (!date) return false;
  const hoy = new Date();
  return date.getDate() === hoy.getDate() && date.getMonth() === hoy.getMonth() && date.getFullYear() === hoy.getFullYear();
}

function renderHoy() {
  const hoyMatches = allData.filter(d => isToday(d.fechaObj) || d.acierto === 'pendiente');
  
  document.getElementById('metrics-hoy').innerHTML = `
    <div class="metric"><div class="label">Partidos para Hoy</div><div class="value">${hoyMatches.length}</div></div>
    <div class="metric"><div class="label">Estado</div><div class="value" style="color:var(--gold)">Pendientes</div></div>
  `;

  const container = document.getElementById('pronosticos-hoy');
  if (hoyMatches.length === 0) {
    container.innerHTML = '<p>No hay partidos pendientes para hoy.</p>';
    return;
  }

  container.innerHTML = hoyMatches.map(d => `
    <div class="prono-card">
      <div class="comp">${d.liga}</div>
      <div class="partido">${d.partido}</div>
      <div>
        <span class="badge badge-prono">Rec: ${d.prono}</span>
        <span class="badge badge-conf">${d.conf}</span>
      </div>
    </div>
  `).join('');
}

function renderHistorico() {
  const resueltos = allData.filter(d => d.acierto !== 'pendiente');
  const tbody = document.getElementById('tabla-historico');
  tbody.innerHTML = resueltos.map(d => `
    <tr>
      <td>${d.fecha}</td>
      <td>${d.liga}</td>
      <td style="color:white; font-weight:600">${d.partido}</td>
      <td>${d.prono}</td>
      <td>${d.conf}</td>
      <td>${d.resultado}</td>
      <td class="acierto-${d.acierto}">${d.acierto === 'si' ? '✓' : '✗'}</td>
    </tr>
  `).join('');
}

function renderEstadisticas() {
  const resueltos = allData.filter(d => d.acierto !== 'pendiente');
  const si = resueltos.filter(d => d.acierto === 'si').length;
  const no = resueltos.filter(d => d.acierto === 'no').length;
  const total = resueltos.length;
  const tasa = total ? Math.round((si / total) * 100) : 0;

  document.getElementById('metrics-stats').innerHTML = `
    <div class="metric"><div class="label">Total Resueltos</div><div class="value">${total}</div></div>
    <div class="metric"><div class="label">Aciertos</div><div class="value" style="color:var(--green)">${si}</div></div>
    <div class="metric"><div class="label">Tasa de Éxito</div><div class="value">${tasa}%</div></div>
  `;

  const ctx = document.getElementById('chart-main').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Aciertos', 'Fallos'],
      datasets: [{ data: [si, no], backgroundColor: ['#10b981', '#ef4444'], borderWidth: 0 }]
    },
    options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
  });
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['hoy','historico','estadisticas'][i] === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

loadData();
</script>
</body>
</html>
