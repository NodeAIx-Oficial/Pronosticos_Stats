<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProStats Dashboard - 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e29;
    --border: rgba(255,255,255,0.07); --accent: #3b82f6;
    --text: #f1f5f9; --text2: #94a3b8; --text3: #475569;
    --green: #10b981; --red: #ef4444; --gold: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 0; }
  
  /* HEADER */
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #3b82f6, #10b981); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo h1 { font-size: 18px; font-weight: 700; }
  
  /* LAYOUT */
  main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; margin-top: 28px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--bg2); padding: 4px; border-radius: 10px; width: fit-content; border: 1px solid var(--border); }
  .tab { padding: 8px 20px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text2); transition: all 0.2s; border: none; background: transparent; }
  .tab.active { background: var(--accent); color: white; }
  .tab:hover:not(.active) { color: var(--text); background: var(--bg3); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* METRIC CARDS */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .metric .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .metric .value { font-size: 26px; font-weight: 700; line-height: 1; }
  .metric.green .value { color: var(--green); }
  .metric.red .value { color: var(--red); }
  .metric.gold .value { color: var(--gold); }
  .metric.blue .value { color: var(--accent); }

  /* PRONOSTICOS DEL DIA */
  .pronosticos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .prono-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; border-left: 4px solid var(--accent); }
  .prono-card .comp { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
  .prono-card .partido { font-size: 15px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; color: white; }
  .prono-card .details { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-prono { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .badge-conf { background: rgba(16,185,129,0.15); color: var(--green); }

  /* TABLA HISTORICO */
  .table-wrapper { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 28px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--bg3); border-bottom: 1px solid var(--border); }
  th { padding: 12px 14px; color: var(--text3); font-weight: 700; text-align: left; text-transform: uppercase; font-size: 11px; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text2); }
  td.partido-name { color: var(--text); font-weight: 600; }
  .acierto-si { color: var(--green); font-weight: 700; }
  .acierto-no { color: var(--red); font-weight: 700; }

  /* ESTADÍSTICAS CHARTS */
  .stats-layout { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 28px; justify-content: space-between; }
  .chart-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
  .chart-box h3 { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 15px; }
  .chart-canvas-wrapper { flex: 1; min-height: 250px; }

  /* LOADING */
  #loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; }
  #error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 16px 20px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; display: none; }
</style>
</head>
<body>

<div id="loading-overlay"><p>Cargando datos...</p></div>

<header>
  <div class="logo">
    <div class="logo-icon">⚽</div>
    <h1>Pro<span style="color:var(--accent)">Stats</span> Dashboard</h1>
  </div>
  <button id="update-btn" style="background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;" onclick="loadData()">Actualizar</button>
</header>

<main>
  <div id="error-msg"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('hoy')">📅 Pronósticos de hoy</button>
    <button class="tab" onclick="switchTab('historico')">📋 Historial</button>
    <button class="tab" onclick="switchTab('estadisticas')">📊 Estadísticas</button>
  </div>

  <div id="tab-hoy" class="tab-content active">
    <div class="metrics" id="metrics-hoy"></div>
    <div class="section-title">Pronósticos del día</div>
    <div class="pronosticos-grid" id="pronosticos-hoy"></div>
  </div>

  <div id="tab-historico" class="tab-content">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Liga</th>
            <th>Partido</th>
            <th>Pronóstico</th>
            <th>%</th>
            <th>Resultado</th>
            <th>Acierto</th>
          </tr>
        </thead>
        <tbody id="tabla-historico"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-estadisticas" class="tab-content">
    <div class="metrics" id="metrics-stats"></div>
    
    <div class="stats-layout">
      <div class="chart-box" style="flex: 1 1 400px;">
        <h3>Tasa diaria (Aciertos y Fallos)</h3>
        <div class="chart-canvas-wrapper">
          <canvas id="chart-daily-cols"></canvas>
        </div>
      </div>
      
      <div class="chart-box" style="flex: 0 0 320px; align-items: center;">
        <h3>Media Total</h3>
        <div class="chart-canvas-wrapper" style="width: 100%; display: flex; align-items: center; justify-content: center;">
          <canvas id="chart-main"></canvas>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// --- TU URL CSV ---
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSlifIeovPtcFbFQfHA_tFamKQQGlsMtoj7mTD1wNs38UAqgLl24tJh9mI3K7Uop5XxqYP22OcvpZsX/pub?output=csv';

let allData = [];
let chartInstance = null; // Gráfico circular media
let chartDailyCols = null; // Gráfico de columnas diarias

// ---- LOAD DATA ----
async function loadData() {
  const btn = document.getElementById('update-btn');
  btn.disabled = true; btn.textContent = '↻ Cargando...';

  try {
    const resp = await fetch(CSV_URL + '&_t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('Sin datos');

    const colMap = getColMap(rows[0]);

    allData = rows.map(r => {
      // Determinamos el estado del acierto
      // 1. Si está marcado TRUE -> acierto
      // 2. Si está FALSE pero hay resultado -> fallo
      // 3. Si está FALSE y no hay resultado -> pendiente
      const aciertoRaw = (r[colMap.acierto] || '').toLowerCase();
      const resultado = r[colMap.resultado] || '';
      let aciertoEstado = 'pendiente';
      
      if (aciertoRaw === 'true' || aciertoRaw === 'si') {
        aciertoEstado = 'si';
      } else if (resultado.trim() !== '' && resultado.trim() !== '—') {
        aciertoEstado = 'no';
      }

      return {
        fecha: r[colMap.fecha],
        fechaObj: parseDate(r[colMap.fecha]),
        liga: r[colMap.comp] || 'Liga',
        partido: `${r[colMap.local]} vs ${r[colMap.visitante]}`,
        prono: r[colMap.prono] || '—',
        conf: r[colMap.conf] || '0%',
        resultado: resultado,
        acierto: aciertoEstado
      };
    });

    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';

    renderHoy();
    renderHistorico();
    renderEstadisticas();

  } catch(e) {
    const em = document.getElementById('error-msg');
    em.style.display = 'block';
    em.textContent = 'Error técnico: ' + e.message;
    console.error(e);
    document.getElementById('loading-overlay').style.display = 'none';
  }
  btn.disabled = false; btn.textContent = '↻ Actualizar';
}

// PARSING CSV (Simplificado y robusto)
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
  return lines.slice(1).map(line => {
    // Expresión regular para manejar comas dentro de comillas (como en 'Real Madrid, vs...')
    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (values[i] || '').replace(/"/g,'').trim());
    return obj;
  });
}

// MAPEO DE COLUMNAS (Basado en tu imagen)
function getColMap(sample) {
  return {
    fecha: 'fecha',
    local: 'local',
    visitante: 'visitante',
    comp: 'liga',
    prono: 'recomendacion',
    conf: '%',
    resultado: 'resultado',
    acierto: 'acierto'
  };
}

// PARSE DATE DD/MM/YYYY
function parseDate(str) {
  if (!str) return null;
  const parts = str.split('/');
  return new Date(parts[2], parts[1]-1, parts[0]);
}

function fmt(date) {
  if (!date) return '—';
  return date.toLocaleDateString('es-ES', {day:'2-digit',month:'2-digit',year:'numeric'});
}

// ---- TAB SWITCH ----
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['hoy','historico','estadisticas'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ---- TAB HOY ----
function renderHoy() {
  // Filtramos por partidos pendientes (acierto == 'pendiente')
  const pendientes = allData.filter(d => d.acierto === 'pendiente');
  // Ordenar cronológicamente (más cercanos primero)
  const display = pendientes.sort((a,b) => (a.fechaObj || 0) - (b.fechaObj || 0));

  document.getElementById('metrics-hoy').innerHTML = `
    <div class="metric blue"><div class="label">Partidos para Hoy</div><div class="value">${display.length}</div></div>
    <div class="metric gold"><div class="label">Estado</div><div class="value">Pendientes</div></div>
  `;

  const container = document.getElementById('pronosticos-hoy');
  if (!display.length) {
    container.innerHTML = '<p style="color:var(--text3); padding:20px;">No hay partidos pendientes para hoy.</p>';
    return;
  }

  container.innerHTML = display.map(d => `
    <div class="prono-card">
      <div class="comp">${d.liga}</div>
      <div class="partido">${d.partido}</div>
      <div class="details">
        <span class="badge badge-prono">Recomendación: ${d.prono}</span>
        <span class="badge badge-conf">Probabilidad: ${d.conf}</span>
      </div>
    </div>
  `).join('');
}

// ---- TAB HISTORICO ----
function renderHistorico() {
  // Solo mostramos partidos con resultado (si/no)
  const resueltos = allData.filter(d => d.acierto === 'si' || d.acierto === 'no');
  // Ordenar (más recientes primero)
  const ordered = resueltos.sort((a,b) => (b.fechaObj || 0) - (a.fechaObj || 0));

  const tbody = document.getElementById('tabla-historico');
  tbody.innerHTML = ordered.map(d => `
    <tr>
      <td>${d.fecha}</td>
      <td>${d.liga}</td>
      <td class="partido-name">${d.partido}</td>
      <td>${d.prono}</td>
      <td>${d.conf}</td>
      <td>${d.resultado}</td>
      <td class="acierto-${d.acierto}">${d.acierto === 'si' ? '✓' : '✗'}</td>
    </tr>
  `).join('');
}

// ---- TAB ESTADÍSTICAS ----
function renderEstadisticas() {
  const resueltos = allData.filter(d => d.acierto === 'si' || d.acierto === 'no');
  const si = resueltos.filter(d => d.acierto === 'si').length;
  const no = resueltos.filter(d => d.acierto === 'no').length;
  const total = resueltos.length;
  const tasa = total ? Math.round((si / total) * 100) : 0;
  const pendientes = allData.filter(d => d.acierto === 'pendiente').length;

  document.getElementById('metrics-stats').innerHTML = `
    <div class="metric"><div class="label">Total Resueltos</div><div class="value">${total}</div></div>
    <div class="metric green"><div class="label">Aciertos</div><div class="value">${si}</div></div>
    <div class="metric red"><div class="label">Fallos</div><div class="value">${no}</div></div>
    <div class="metric gold"><div class="label">Tasa de Éxito</div><div class="value">${tasa}%</div></div>
  `;

  // --- MODIFICACIÓN SOLICITADA: Gráfico de columnas diarias ---
  const dailyData = {};
  resueltos.forEach(d => {
    if (!dailyData[d.fecha]) {
      dailyData[d.fecha] = { si: 0, no: 0 };
    }
    dailyData[d.fecha][d.acierto]++;
  });

  // Ordenar fechas cronológicamente para el eje X
  const dailyLabels = Object.keys(dailyData).sort((a, b) => {
    return parseDate(a) - parseDate(b);
  });

  const dailySi = dailyLabels.map(fecha => dailyData[fecha].si);
  const dailyNo = dailyLabels.map(fecha => dailyData[fecha].no);

  const ctxDaily = document.getElementById('chart-daily-cols').getContext('2d');
  if (chartDailyCols) chartDailyCols.destroy(); // Limpiar instancia anterior

  chartDailyCols = new Chart(ctxDaily, {
    type: 'bar',
    data: {
      labels: dailyLabels,
      datasets: [
        {
          label: 'Aciertos',
          data: dailySi,
          backgroundColor: '#10b981', // Verde acierto
          borderRadius: 5,
        },
        {
          label: 'Fallos',
          data: dailyNo,
          backgroundColor: '#ef4444', // Rojo fallo
          borderRadius: 5,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#94a3b8', font: { size: 10 }, boxWidth: 12 }
        },
        tooltip: {
          mode: 'index',
          intersect: false
        }
      },
      scales: {
        x: {
          stacked: true, // Columnas apiladas
          ticks: { color: '#94a3b8', font: { size: 9 }, maxRotation: 45, minRotation: 0 },
          grid: { display: false }
        },
        y: {
          stacked: true, // Columnas apiladas
          ticks: { color: '#94a3b8', font: { size: 10 } },
          grid: { color: 'rgba(255,255,255,0.03)' },
          title: { display: true, text: 'Nº Partidos', color: '#94a3b8', font: { size: 11 } }
        }
      }
    }
  });

  // --- Gráfico circular Media (existing logic, moved) ---
  const ctx = document.getElementById('chart-main').getContext('2d');
  if (chartInstance) chartInstance.destroy(); // Limpiar instancia anterior
  
  chartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Aciertos', 'Fallos'],
      datasets: [{
        data: [si, no],
        backgroundColor: ['#10b981', '#ef4444'], // Verde y Rojo
        borderWidth: 0,
        cutout: '70%'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#94a3b8', font: { size: 11 } }
        },
        tooltip: {
          callbacks: {
            label: (ctx) => ` ${ctx.label}: ${ctx.raw} (${total ? Math.round((ctx.raw/total)*100) : 0}%)`
          }
        }
      }
    }
  });
}

// INIT
loadData();
</script>
</body>
</html>
